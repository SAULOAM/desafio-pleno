name: Pipeline Orchestrator

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  demo:
    uses: ./.github/workflows/github-actions-demo.yml

  sonar-scan:
    needs: demo
    uses: ./.github/workflows/sonar-scan.yml
    secrets: inherit

  terraform-lint:
    needs: demo
    uses: ./.github/workflows/terraform-lint.yml

  terraform-deploy:
    needs: [sonar-scan, terraform-lint]
    uses: ./.github/workflows/terraform-deploy.yml
    secrets: inherit

  app-deploy:
    needs: terraform-deploy
    uses: ./.github/workflows/app-deploy.yml
    secrets: inherit

  display-endpoint:
    needs: app-deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool-globo/providers/github-pool-globo'
          service_account: 'github-actions-sa@projeto-globo-489614.iam.gserviceaccount.com'

      - name: Get GKE Credentials
        uses: 'google-github-actions/get-gke-credentials@v2'
        with:
          cluster_name: 'desafio-pleno-cluster'
          location: 'us-central1'

      - name: Show Public IP
        run: |
          echo "Buscando serviços no cluster..."
          
          # Busca IP da API (Namespace default)
          API_IP=$(kubectl get service api-py-service -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          
          # Busca IP do Grafana (Namespace monitoring)
          GRAFANA_IP=$(kubectl get service -n monitoring prometheus-stack-grafana -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          
          # Busca IP do Prometheus (Namespace monitoring)
          PROMETHEUS_IP=$(kubectl get service -n monitoring prometheus-stack-kube-prometheus-prometheus -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)

          echo "--------------------------------------------------"
          if [ -n "$API_IP" ]; then
            echo "::notice title=API Endpoint::http://$API_IP:80"
            echo "API: http://$API_IP:80"
          else
            echo "::warning::API IP ainda pendente."
          fi

          if [ -n "$GRAFANA_IP" ]; then
            echo "::notice title=Grafana::http://$GRAFANA_IP:80"
            echo "Grafana: http://$GRAFANA_IP:80 (User: admin | Pass: admin)"
          else
            echo "::warning::Grafana IP ainda pendente."
          fi

          if [ -n "$PROMETHEUS_IP" ]; then
            echo "::notice title=Prometheus::http://$PROMETHEUS_IP:9090"
            echo "Prometheus: http://$PROMETHEUS_IP:9090"
          else
            echo "::warning::Prometheus IP ainda pendente."
          fi
          echo "--------------------------------------------------"