name: Pipeline Orchestrator

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  demo:
    uses: ./.github/workflows/github-actions-demo.yml

  sonar-scan:
    needs: demo
    uses: ./.github/workflows/sonar-scan.yml
    secrets: inherit

  terraform-lint:
    needs: demo
    uses: ./.github/workflows/terraform-lint.yml

  auth-deploy:
    needs: [sonar-scan, terraform-lint]
    uses: ./.github/workflows/gcp-auth.yml
    secrets: inherit # Importante: passa os segredos (como GCP_PROJECT_NUMBER) para o workflow chamado

  terraform-deploy:
    needs: auth-deploy
    uses: ./.github/workflows/terraform-deploy.yml
    secrets: inherit # Importante: passa os segredos (como GCP_PROJECT_NUMBER) para o workflow chamado

  app-deploy:
    needs: terraform-deploy
    uses: ./.github/workflows/app-deploy.yml
    secrets: inherit