apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-py
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Garante que um novo pod seja criado antes do antigo ser removido.
      # Essencial para zero downtime com 1 réplica.
      maxSurge: 1
      maxUnavailable: 0
  replicas: 1
  selector:
    matchLabels:
      app: api-py
  template:
    metadata:
      labels:
        app: api-py
    spec:
      containers:
      - name: api-py
        image: IMAGE_PLACEHOLDER # Será substituído pelo pipeline
        ports:
        - containerPort: 8000
        # Probes para garantir que o pod está saudável e pronto para receber tráfego.
        # Crucial para zero-downtime deployments.
        readinessProbe:
          httpGet:
            path: / # Assumindo que a raiz da API retorna um status 2xx-3xx
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: / # Assumindo que a raiz da API retorna um status 2xx-3xx
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-py-service
spec:
  type: LoadBalancer
  selector:
    app: api-py
  ports:
  - port: 80
    targetPort: 8000