apiVersion: v1
kind: ConfigMap
metadata:
  name: api-py-dashboard
  # O ConfigMap deve estar no namespace onde o Grafana vai procurar (definido no Terraform)
  namespace: default
  labels:
    # Esta label é usada pelo sidecar do Grafana para descobrir o dashboard
    grafana_dashboard: "1"
data:
  api-py-dashboard.json: |-
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "description": "",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "__requires": [],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "title": "Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(flask_http_requests_total{job=\"default/api-py-service\"}[5m])) by (method, status)",
              "legendFormat": "{{method}} - {{status}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "title": "P99 Request Latency",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(flask_http_requests_latency_seconds_bucket{job=\"default/api-py-service\"}[5m])) by (le, method))",
              "legendFormat": "{{method}}"
            }
          ],
          "unit": "s"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "title": "Error Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(flask_http_requests_exceptions_total{job=\"default/api-py-service\"}[5m])) by (method)",
              "legendFormat": "{{method}}"
            }
          ]
        }
      ],
      "refresh": "10s",
      "schemaVersion": 35,
      "style": "dark",
      "tags": ["api-py"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "API-PY Metrics",
      "uid": "api-py-dashboard",
      "version": 1
    }
